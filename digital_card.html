<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven Intelligence — Tarjeta Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg:   #0a0a0c;
            --neon: #ccff00;
            --text: #f8f9fa;
            --muted:#8b8d98;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background:#111;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            font-family:'Inter',sans-serif;
        }

        /* ============================================================
           CARD: 1080×1920 px reales
           Escala de visualización: 40%
           Para exportar → F12 → Ctrl+Shift+P → "Capture full size screenshot"
        ============================================================ */
        .card {
            width:1080px;
            height:1920px;
            background:var(--bg);
            position:relative;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:90px;
            padding:120px 100px;
            transform:scale(0.42);
            transform-origin:top center;
        }

        /* ── Fondos ── */
        .grid {
            position:absolute; inset:0;
            background-size:88px 88px;
            background-image:
              linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
              linear-gradient(90deg,rgba(255,255,255,.025) 1px, transparent 1px);
            z-index:0;
        }
        .glow {
            position:absolute; border-radius:50%; z-index:0;
        }
        .glow-a {
            width:1400px; height:1400px;
            top:-680px; left:-200px;
            background:radial-gradient(circle, rgba(204,255,0,.18) 0%, transparent 60%);
        }
        .glow-b {
            width:800px; height:800px;
            bottom:-350px; right:-150px;
            background:radial-gradient(circle, rgba(204,255,0,.09) 0%, transparent 60%);
        }
        .sideline {
            position:absolute; top:200px; bottom:200px; width:2px; z-index:0;
            background:linear-gradient(to bottom, transparent, var(--neon) 45%, transparent);
            opacity:.3;
        }
        .sideline.l { left:58px; }
        .sideline.r { right:58px; }

        /* ── Zonas ── */
        .z {
            position:relative; z-index:10;
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        /* ── LOGO OFICIAL ── */
        .logo-zone { gap:0; }
        .logo-img {
            width:760px;          /* ancho generoso para que no se corte el texto */
            object-fit:contain;
            /* mix-blend-mode:screen → el negro del PNG desaparece sobre fondos dark */
            mix-blend-mode:screen;
            filter:drop-shadow(0 0 24px rgba(204,255,0,.22));
        }

        /* ── DIVISOR ── */
        .divider {
            position:relative; z-index:10;
            width:700px; height:1.5px; flex-shrink:0;
            background:linear-gradient(to right, transparent, var(--neon) 50%, transparent);
            opacity:.5;
        }

        /* ── PERFIL ── */
        .profile-zone { gap:26px; text-align:center; }
        .pname {
            font-family:'Plus Jakarta Sans',sans-serif;
            font-size:68px; font-weight:800; letter-spacing:-1px;
            color:var(--text);
        }
        .prole {
            font-size:31px; letter-spacing:5px; text-transform:uppercase;
            color:var(--neon); font-weight:500;
        }
        .pills {
            display:flex; gap:20px; flex-wrap:wrap;
            justify-content:center; margin-top:8px;
        }
        .pill {
            background:rgba(204,255,0,.07);
            border:1px solid rgba(204,255,0,.22);
            color:var(--muted); font-size:25px;
            padding:10px 30px; border-radius:100px;
        }

        /* ── QR ── */
        .qr-zone {
            gap:36px;
            background:rgba(255,255,255,.025);
            border:1.5px solid rgba(204,255,0,.22);
            border-radius:44px;
            padding:72px 96px 60px;
            box-shadow:0 0 60px rgba(0,0,0,.5),
                       inset 0 0 24px rgba(204,255,0,.04);
        }
        #qrcode {
            background:#fff;
            padding:20px;
            border-radius:16px;
            line-height:0;
            /* El container fija el tamaño para que canvas e img no se dupliquen visualmente */
            width:374px; height:374px;
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
        }
        #qrcode canvas,
        #qrcode img {
            display:block;
            width:334px !important;
            height:334px !important;
        }
        .qr-cta {
            font-family:'Plus Jakarta Sans',sans-serif;
            color:var(--text); font-size:40px; font-weight:700;
            text-align:center;
        }
        .qr-hint {
            color:var(--muted); font-size:26px;
            text-align:center; margin-top:-16px;
            letter-spacing:1px;
        }
    </style>
</head>
<body>

<div class="card" id="card">
    <!-- Fondos -->
    <div class="grid"></div>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <div class="sideline l"></div>
    <div class="sideline r"></div>

    <!-- ① LOGO OFICIAL (mezcla screen → elimina el negro del PNG) -->
    <div class="z logo-zone">
        <img src="images/logo_raven_full.png" alt="RAVEN INTELLIGENCE" class="logo-img">
    </div>

    <!-- Divisor neón -->
    <div class="divider"></div>

    <!-- ② PERFIL -->
    <div class="z profile-zone">
        <div class="pname">Ing. Jesús M. Arcia</div>
        <div class="prole">Data Analyst · AI Automation</div>
        <div class="pills">
            <span class="pill">Power BI</span>
            <span class="pill">Python</span>
            <span class="pill">N8N</span>
            <span class="pill">Business Intelligence</span>
        </div>
    </div>

    <!-- ③ QR → Hub de Links (Landing · WA · LinkedIn · GitHub) -->
    <div class="z qr-zone">
        <div id="qrcode"></div>
        <div class="qr-cta">Escaneame · Conéctate</div>
        <div class="qr-hint">Landing · WhatsApp · LinkedIn · GitHub</div>
    </div>

</div>

<script>
    // Generamos el QR apuntando al Hub de Links
    new QRCode(document.getElementById("qrcode"), {
        text: "https://unique-sunburst-2842b9.netlify.app/links.html",
        width:  334,
        height: 334,
        colorDark:  "#0a0a0c",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    // Eliminamos el elemento duplicado que genera el plugin
    // (genera canvas en Chrome y/o img en otros; a veces ambos)
    setTimeout(function() {
        var box   = document.getElementById("qrcode");
        var canvas = box.querySelector("canvas");
        var img    = box.querySelector("img");

        if (canvas && img) {
            // Ambos presentes → eliminamos la img, dejamos canvas
            img.parentNode.removeChild(img);
        }
        // Si solo hay uno de los dos, ya está bien
    }, 150);
</script>
</body>
</html>
